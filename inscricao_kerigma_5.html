<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerigma Registration Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="Kerigma Logo">
        <h1>Kerigma Registration Form</h1>
    </header>
    <form id="registration-form">
        <h2>Step 1: Personal Data</h2>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <h2>Step 2: Modality Selection</h2>
        <label for="modality">Select Modality:</label>
        <select id="modality" name="modality" required>
            <option value="online">Online</option>
            <option value="in-person">In-Person</option>
        </select>

        <h2>Step 3: Payment Conditions</h2>
        <label for="payment">Payment Method:</label>
        <select id="payment" name="payment" required>
            <option value="credit-card">Credit Card</option>
            <option value="bank-transfer">Bank Transfer</option>
        </select>

        <h2>Step 4: Digital Signature</h2>
        <label for="signature">Signature:</label>
        <input type="text" id="signature" name="signature" required placeholder="Sign here">

        <h2>Step 5: Contract Review</h2>
        <textarea id="contract-review" name="contract-review">Please review the terms and conditions...</textarea>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
