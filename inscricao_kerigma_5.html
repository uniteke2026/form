<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theological University Registration Form</title>
</head>
<body>
    <h1>Theological University Registration</h1>
    <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required><br>

        <label for="degree">Degree Program:</label>
        <select id="degree" name="degree" required>
            <option value="theology">Theology</option>
            <option value="biblical_studies">Biblical Studies</option>
            <option value="pastoral_care">Pastoral Care</option>
            <option value="youth_ministry">Youth Ministry</option>
        </select><br>

        <label for="submission_date">Submission Date:</label>
        <input type="datetime" id="submission_date" name="submission_date" value="2026-03-25T12:12:42" readonly><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
